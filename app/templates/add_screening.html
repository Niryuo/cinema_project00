{% extends "base.html" %}

{% block content %}

<h2>Добавить сеанс для {{ movie.title }}</h2>

<form method="POST">
    <input type="text" name="hall_name" placeholder="Зал" required><br><br>
    <input type="datetime-local" name="start_time" required><br><br>
    <input type="number" name="hall_rows" placeholder="Ряды" min="1" value="5" required><br><br>
    <input type="number" name="hall_cols" placeholder="Места" min="1" value="10" required><br><br>
    <input type="number" name="ticket_price" placeholder="Цена билета" min="1" step="0.01" value="450" required><br><br>
    <button type="submit" class="btn btn-cinema">Добавить</button>
</form>

{% endblock %}
